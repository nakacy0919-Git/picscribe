<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicScribe - English Writing Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-wrapper">
        <header id="app-header">
            <img src="images/logo.webp" alt="PicScribe Logo" id="app-logo" onerror="this.src='https://via.placeholder.com/120x120?text=Logo'">
            <div class="header-content">
                <h1 class="app-title"><span class="title-pic">Pic</span><span class="title-scribe">Scribe</span></h1>
                <div class="app-subtitle">ENGLISH WRITING PLATFORM</div>
                <div class="app-desc">写真や画像を英語でタイピングして描写しよう！</div>
            </div>
        </header>
        
        <!-- ★修正：game-containerを確実に縦並びに固定 -->
        <div id="game-container" style="display: flex; flex-direction: column;">
            
            <!-- ==============================================
                 上部ブロック：トップダッシュボード（進行状況＋アシスト）
                 ============================================== -->
            <div id="top-dashboard" class="dashboard-layout">
                
                <!-- 洗練された半円グラフ (Coverage Rate) -->
                <div id="live-status" class="dashboard-panel score-panel">
                    <div class="status-header">COVERAGE RATE</div>
                    <div class="gauge-container">
                        <svg viewBox="0 0 100 50" class="half-donut">
                            <path d="M 10 50 A 40 40 0 0 1 90 50" class="gauge-bg"/>
                            <path d="M 10 50 A 40 40 0 0 1 90 50" class="gauge-fill" id="gauge-fill-path"/>
                        </svg>
                        <div id="live-score" class="gauge-text">0<span class="pts">%</span></div>
                    </div>
                </div>

                <!-- ステップアップ型アシストパネル（プロフェッショナル版） -->
                <div id="step-assistant-panel" class="dashboard-panel assistant-panel">
                    <div class="assistant-header">
                        <h2 id="current-step-title" class="modern-step-title">Step 1: Main Gist</h2>
                        <div class="assistant-actions">
                            <span id="step-progress-badge" class="modern-badge">1 / 3 挑戦中</span>
                            <button id="skip-step-btn" class="skip-btn hidden">答えを見てスキップ ⏭</button>
                        </div>
                    </div>
                    
                    <!-- SVO スロットエリア -->
                    <div id="svo-slots-container" class="modern-stepper">
                        <div class="stepper-item" id="slot-subject">
                            <div class="stepper-icon" id="icon-subject">1</div>
                            <div class="stepper-text">
                                <span class="stepper-title">Subject</span>
                                <span class="stepper-subtitle">主語</span>
                            </div>
                        </div>
                        
                        <div class="stepper-divider"></div>
                        
                        <div class="stepper-item" id="slot-verb">
                            <div class="stepper-icon" id="icon-verb">2</div>
                            <div class="stepper-text">
                                <span class="stepper-title">Action</span>
                                <span class="stepper-subtitle">動作</span>
                            </div>
                        </div>
                        
                        <div class="stepper-divider"></div>
                        
                        <div class="stepper-item" id="slot-object">
                            <div class="stepper-icon" id="icon-object">3</div>
                            <div class="stepper-text">
                                <span class="stepper-title">Object</span>
                                <span class="stepper-subtitle">目的語</span>
                            </div>
                        </div>
                    </div>

                    <!-- ヒントメッセージ -->
                    <div class="modern-message" id="assistant-message">
                        まずは描写の中に主語を入れてみましょう。
                    </div>
                </div>
            </div> <!-- 上部ブロック ここまで -->


            <!-- ==============================================
                 下部ブロック：メインプレイエリア（画像 ＋ 入力欄）
                 ============================================== -->
            <div class="two-column-layout">
                
                <!-- 左カラム：画像とサポート機能 -->
                <div id="left-column">
                    <div id="support-controls">
                        <label class="switch-label">
                            <input type="checkbox" id="support-switch"> Support Mode (Hint)
                        </label>
                        <select id="hint-level-select" class="hidden">
                            <option value="primary">Gist (要点のみ)</option>
                            <option value="all">All Details (詳細も含む)</option>
                        </select>
                    </div>

                    <div id="image-area">
                        <img id="target-image" src="" alt="Target Image">
                        <div id="effect-container"></div>
                        <div id="overlays-container"></div>
                    </div>

                    <div id="hint-panel" class="hidden">
                        <div class="hint-header">
                            <h3 id="hint-title">Hint</h3>
                            <button id="close-hint-btn">×</button>
                        </div>
                        <div id="hint-content"></div>
                    </div>
                </div>

                <!-- 右カラム：入力エリア -->
                <div id="right-column">
                    <!-- 辞書検索ウィジェット -->
                    <div id="dictionary-widget">
                        <div class="search-icon">🔍</div>
                        <input type="text" id="dict-search-input" placeholder="Search dictionary (En/Ja)..." autocomplete="off">
                        <ul id="dict-suggestions" class="hidden"></ul>
                    </div>

                    <!-- 入力エリア本体 -->
                    <div id="input-area">
                        <div id="user-input" 
                             contenteditable="true" 
                             spellcheck="true" 
                             lang="en" 
                             placeholder="Type your description here... (e.g. A young woman is drinking coffee...)"></div>
                        
                        <button id="submit-btn">Finish & Check</button>
                    </div>

                    <!-- 結果表示エリア -->
                    <div id="result-area" class="hidden">
                        <h2 id="feedback-msg"></h2>
                        <div class="model-answers">
                            <h3>Model Answers:</h3>
                            <ul id="model-answers-list"></ul>
                        </div>
                        <button id="retry-btn">Try Another</button>
                    </div>
                </div>
            </div> <!-- 下部ブロック ここまで -->

        </div> <!-- game-container ここまで -->
        
        <!-- 辞書詳細ポップアップ -->
        <div id="dict-modal" class="hidden">
            <div class="dict-modal-content">
                <button id="close-dict-btn">×</button>
                <div class="dict-header">
                    <h2 id="dict-word-title">Word</h2>
                    <span id="dict-word-meaning">意味</span>
                </div>
                <div class="dict-body">
                    <div class="dict-section">
                        <h4>💡 Explanation (解説)</h4>
                        <p id="dict-explanation"></p>
                    </div>
                    <div class="dict-section">
                        <h4>📊 Corpus Data (使用頻度)</h4>
                        <p id="dict-corpus"></p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="data/cafe_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
